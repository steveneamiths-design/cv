<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Studio | Maroon & Yellow</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7D1128;
            --accent: #FFC107;
            --bg: #fdfaf5;
        }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); padding: 40px 20px; display: flex; justify-content: center; margin: 0; }
        .builder-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(125,17,40,0.08); width: 100%; max-width: 800px; border-top: 6px solid var(--primary); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; font-size: 2.2rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: var(--primary); }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; background: #fafafa;}
        input:focus, textarea:focus { border-color: var(--accent); outline: none; background: #fff; box-shadow: 0 0 0 3px rgba(255,193,7,0.1); }
        button { width: 100%; padding: 15px; background: var(--primary); color: var(--accent); border: none; border-radius: 6px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1.5px;}
        button:hover { background: #600D1F; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="builder-card">
    <h2>Paghimo og CV nimo bai</h2>
    <form action="amiths.php" method="POST" enctype="multipart/form-data">
        
        <div class="grid-2">
            <div class="input-group"><label>Full Name</label><input type="text" name="fullName" required placeholder="Stevene Amiths"></div>
            <div class="input-group"><label>Profession</label><input type="text" name="profession" required placeholder="IT Specialist"></div>
        </div>
        
        <div class="grid-2">
            <div class="input-group"><label>Email</label><input type="email" name="email" required placeholder="stevene@evsu.edu.ph"></div>
            <div class="input-group"><label>Phone</label><input type="text" name="phone" required placeholder="+63 912 345 6789"></div>
        </div>

        <div class="input-group"><label>Address</label><input type="text" name="address" required placeholder="Iloilo City, Philippines"></div>
        
        <div class="grid-2">
            <div class="input-group"><label>Skills (comma separated)</label><input type="text" name="skills" required placeholder="PHP, HTML, Design"></div>
            <div class="input-group"><label>Profile Picture</label><input type="file" name="profilePic" accept="image/*" required></div>
        </div>

        <div class="input-group"><label>Professional Summary</label><textarea name="summary" rows="3" required placeholder="Short bio..."></textarea></div>

        <hr style="border: 0; border-top: 1px solid var(--primary); margin: 30px 0; opacity: 0.3;">

        <div class="grid-2">
            <div class="input-group"><label>Job Title</label><input type="text" name="exp_title" required placeholder="Web Developer"></div>
            <div class="input-group"><label>Company</label><input type="text" name="exp_company" required placeholder="Tech Corp"></div>
        </div>
        <div class="grid-2">
            <div class="input-group"><label>Duration</label><input type="text" name="exp_duration" required placeholder="2022 - Present"></div>
            <div class="input-group"><label>Job Description</label><textarea name="exp_desc" rows="2" required placeholder="Responsibilities..."></textarea></div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--primary); margin: 30px 0; opacity: 0.3;">

        <div class="grid-2">
            <div class="input-group"><label>Degree</label><input type="text" name="edu_degree" required placeholder="BSIT"></div>
            <div class="input-group"><label>School</label><input type="text" name="edu_school" required placeholder="EVSU"></div>
        </div>
        <div class="input-group"><label>Graduation Year</label><input type="text" name="edu_year" required placeholder="2026"></div>

        <button type="submit">Generate Professional CV</button>
    </form>
</div>

</body>
</html>
